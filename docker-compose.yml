# ============================================================
# Kyro — Docker Compose (Development)
# ============================================================

version: "3.9"

services:
  kyro-api:
    build: .
    container_name: kyro-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - .:/app
      - ./logs:/app/logs
    restart: unless-stopped

